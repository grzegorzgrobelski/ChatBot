<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
    <title>External Live Agent</title>
</head>
<body>
    <script type='text/javascript'>
        function initEmbeddedMessaging() {
            try {
                embeddedservice_bootstrap.settings.language = 'pl'; // For example, enter 'en' or 'en-US'

                embeddedservice_bootstrap.init(
                    '00D9O00000PCIdt',
                    'Demo_Embedded_GS1',
                    'https://foundationgs1poland2--newopptype.sandbox.my.site.com/ESWDemoEmbeddedGS11771865042666',
                    {
                        scrt2URL: 'https://foundationgs1poland2--newopptype.sandbox.my.salesforce-scrt.com'
                    }
                );
                addBlockEvent();

                window.addEventListener("onEmbeddedMessagingSessionStatusUpdate", (event) => {
                    console.log("START:: Status Update");
                
                    const tempContent = event.detail;
                    console.log(JSON.stringify(tempContent));
                    const sessionData = JSON.parse(tempContent.conversationEntry.entryPayload);

                    if (
                        sessionData.sessionStatus === "Ended" &&
                        sessionData.sessionStatusPrev === "Active" && 
                        sessionData.sessionEndedByRole === 'Agent' 
                    ) {
                        console.log("Active Session ended");
                        embeddedservice_bootstrap.userVerificationAPI
                        .clearSession()
                        .then(() => {
                            console.log("Session cleared successfully.");
                        })
                        .catch((error) => {
                            console.error("Error clearing session:", error);
                        })
                        .finally(() => {
                            console.log("clearSession finally.");
                            window.alert("Agent Ended the Chat!!!");
                        });
                    }
                    
                    console.log("END:: Status Update");
                });

            } catch (err) {
                console.error('Error loading Embedded Messaging: ', err);
            }
        };

        
        function addBlockEvent() {
            window.addEventListener("message", (event) => {
                if (
                    event.data?.method === "EMBEDDED_MESSAGING_DISPATCH_EVENT_TO_HOST" &&
                    event.data?.data?.eventDetails?.conversationEntry &&
                    event.data.data.eventDetails.conversationEntry.entryPayload &&
                    event.data.data.eventDetails.conversationEntry.entryType === "ParticipantChanged"
                ) {
                    const entry = event.data.data.eventDetails.conversationEntry;
                    const payload = JSON.parse(entry.entryPayload);

                    const participantEvent = payload.entries?.[0];
                    if (
                        participantEvent &&
                        participantEvent.operation === "add" &&
                        participantEvent.participant?.role === "Agent"
                    ) {
                        postIframeEnable(); 
                    } else {
                        postIframeDisable();
                    }
                }
            });
        }

        function addSessionStatusUpdate() {
            
        }


        function postIframeEnable() {
            var iframe = document.getElementById("embeddedMessagingFrame");
            iframe.contentWindow.postMessage('InputEnable', '*');
        }

        function postIframeDisable() {
            var iframe = document.getElementById("embeddedMessagingFrame");
            iframe.contentWindow.postMessage('InputDisable', '*');
        }

    </script>
    <script type='text/javascript' src='https://foundationgs1poland2--newopptype.sandbox.my.site.com/ESWDemoEmbeddedGS11771865042666/assets/js/bootstrap.min.js' onload='initEmbeddedMessaging()'></script>
</body>
</html>
